sentence=Embedded Template Library (ETL). Fixed size containers and state machines for Arduino and ESP32 with zero heap allocation.
paragraph=ETL_Arduino provides production-grade, no-heap C++ containers for embedded systems: fixed-size vector, queue (circular buffer), map (key-value store), string, and a finite state machine with enter/exit/update callbacks. Designed as a safe replacement for STL on Arduino and ESP32 where heap fragmentation is a concern. All storage is compile-time allocated, no malloc, no new, no fragmentation.
